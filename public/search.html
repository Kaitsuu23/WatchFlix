<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cari — WatchFlix</title>
  <link rel="icon" type="image/x-icon" href="/icon/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/icon/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/icon/favicon-16x16.png" />
  <link rel="apple-touch-icon" href="/icon/apple-touch-icon.png" />
  <link rel="manifest" href="/icon/site.webmanifest" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="bg-blob blob-1"></div>
  <div class="bg-blob blob-2"></div>
  <div class="bg-blob blob-3"></div>

  <nav class="navbar glass">
    <a href="/" class="nav-brand"><img src="/icon/favicon-32x32.png" alt="WatchFlix" class="nav-logo" />Watch<span>Flix</span></a>
    <div class="nav-links">
      <button class="nav-btn" onclick="location.href='/'">Movies</button>
      <div class="nav-dropdown">
        <button class="nav-btn" id="dramaBtn">Drama ▾</button>
        <div class="nav-dropdown-menu glass" id="dramaMenu">
          <a class="dropdown-item" href="/drama/popular">Terpopuler</a>
          <a class="dropdown-item" href="/drama/latest">Baru Diupload</a>
          <a class="dropdown-item" href="/drama/ongoing">Ongoing</a>
          <a class="dropdown-item" href="/drama/complete">Komplit</a>
          <a class="dropdown-item" href="/drama/west">West Region</a>
          <a class="dropdown-item" href="/drama/asian">Asian Region</a>
          <a class="dropdown-item" href="/drama/rating">Rating</a>
          <a class="dropdown-item" href="/drama/recent">Release</a>
        </div>
      </div>
      <button class="nav-btn" onclick="location.href='/popular'">Popular</button>
      <button class="nav-btn" onclick="location.href='/top-rated'">Top Rated</button>
    </div>
    <div class="nav-right">
      <div class="search-wrap glass-input">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="Cari film atau series..." autofocus />
      </div>
    </div>
  </nav>

  <main class="main-content" style="padding-top:1.5rem">
    <div class="section-header">
      <h2 id="sectionTitle">Hasil Pencarian</h2>
      <span class="result-count" id="resultCount"></span>
    </div>

    <div class="movie-grid" id="movieGrid"></div>

    <div class="loader-wrap" id="loader">
      <div class="spinner"></div>
    </div>

    <div class="empty-state hidden" id="emptyState">
      <div class="empty-icon">🔍</div>
      <p id="emptyMsg">Ketik untuk mencari film atau series</p>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay hidden" id="modalOverlay">
    <div class="modal glass" id="modal">
      <button class="modal-close" id="modalClose">✕</button>
      <div class="modal-inner" id="modalContent"></div>
    </div>
  </div>

  <script src="/js/search.js"></script>

  <footer class="site-footer">
    <p>© 2026 <strong>WatchFlix</strong> by Kaitsuu23. All rights reserved.</p>
  </footer>
</body>
</html>
